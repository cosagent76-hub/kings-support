<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 414 900" role="img" aria-labelledby="title desc">
  <title id="title">Kings Start New Game screen preview</title>
  <desc id="desc">A phone preview of the Kings home screen with a Start New Game button.</desc>
  <rect width="414" height="900" fill="#f7f3eb"/>
  <rect x="28" y="46" width="358" height="808" rx="42" fill="#ffffff" stroke="#ded5c5" stroke-width="3"/>
  <circle cx="207" cy="146" r="54" fill="#1b6f65"/>
  <text x="207" y="163" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="54" font-weight="800" fill="#ffffff">K</text>
  <text x="207" y="238" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="42" font-weight="800" fill="#171613">Kings</text>
  <rect x="62" y="306" width="290" height="66" rx="12" fill="#1b6f65"/>
  <text x="207" y="348" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="25" font-weight="800" fill="#ffffff">Start New Game</text>
  <rect x="62" y="410" width="290" height="108" rx="18" fill="#fffdf8" stroke="#ded5c5" stroke-width="2"/>
  <text x="88" y="456" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24" font-weight="800" fill="#171613">In-Progress Games</text>
  <text x="88" y="492" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="19" fill="#625f58">Resume or start fresh.</text>
  <rect x="62" y="552" width="290" height="162" rx="18" fill="#fffdf8" stroke="#ded5c5" stroke-width="2"/>
  <text x="88" y="598" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24" font-weight="800" fill="#171613">Game Night</text>
  <text x="88" y="636" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="19" fill="#625f58">Choose players, deal cards,</text>
  <text x="88" y="666" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="19" fill="#625f58">and let Kings handle scores.</text>
</svg>
