<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 414 900" role="img" aria-labelledby="title desc">
  <title id="title">Kings Choose Players screen preview</title>
  <desc id="desc">A phone preview of the Kings Choose Players setup step.</desc>
  <rect width="414" height="900" fill="#f7f3eb"/>
  <rect x="28" y="46" width="358" height="808" rx="42" fill="#ffffff" stroke="#ded5c5" stroke-width="3"/>
  <text x="62" y="122" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="19" font-weight="800" fill="#1b6f65">Step 1 of 3</text>
  <text x="62" y="166" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="36" font-weight="800" fill="#171613">Choose Players</text>
  <text x="62" y="205" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" fill="#625f58">Choose 2 to 6 players.</text>
  <rect x="62" y="248" width="290" height="52" rx="12" fill="#1b6f65"/>
  <text x="207" y="282" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20" font-weight="800" fill="#ffffff">Add Player</text>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="21" font-weight="800" fill="#171613">
    <rect x="62" y="336" width="290" height="72" rx="16" fill="#fffdf8" stroke="#1b6f65" stroke-width="3"/>
    <circle cx="102" cy="372" r="22" fill="#e1b865"/>
    <text x="140" y="381">Alex</text>
    <rect x="62" y="424" width="290" height="72" rx="16" fill="#fffdf8" stroke="#1b6f65" stroke-width="3"/>
    <circle cx="102" cy="460" r="22" fill="#57c1b4"/>
    <text x="140" y="469">Sam</text>
    <rect x="62" y="512" width="290" height="72" rx="16" fill="#fffdf8" stroke="#ded5c5" stroke-width="2"/>
    <circle cx="102" cy="548" r="22" fill="#ded5c5"/>
    <text x="140" y="557">Jordan</text>
    <rect x="62" y="600" width="290" height="72" rx="16" fill="#fffdf8" stroke="#ded5c5" stroke-width="2"/>
    <circle cx="102" cy="636" r="22" fill="#ded5c5"/>
    <text x="140" y="645">Taylor</text>
