    <text x="88" y="272" font-size="21" font-weight="800" fill="#171613">Alex</text>
    <text x="88" y="322" font-size="42" font-weight="900" fill="#1b6f65">42</text>
    <rect x="218" y="226" width="134" height="118" rx="18" fill="#fffdf8" stroke="#ded5c5" stroke-width="2"/>
    <text x="244" y="272" font-size="21" font-weight="800" fill="#171613">Sam</text>
    <text x="244" y="322" font-size="42" font-weight="900" fill="#171613">55</text>
    <rect x="62" y="366" width="134" height="118" rx="18" fill="#fffdf8" stroke="#ded5c5" stroke-width="2"/>
    <text x="88" y="412" font-size="21" font-weight="800" fill="#171613">Jo</text>
    <text x="88" y="462" font-size="42" font-weight="900" fill="#171613">61</text>
